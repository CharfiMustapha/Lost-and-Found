<header  class="site-header header-style-3 mobile-sider-drawer-menu">

    <div class="sticky-header main-bar-wraper  navbar-expand-lg">
        <div class="main-bar">  
                            
            <div class="container-fluid clearfix"> 
        
                <div class="logo-header">
                    <div class="logo-header-inner logo-header-one">
                        <a href="index.html">
                        <img src="assets/images/logo1.png" alt="">
                        </a>
                    </div>
                </div>  
                <!-- NAV Toggle Button -->
                <button id="mobile-side-drawer" data-target=".header-nav" data-toggle="collapse" type="button" class="navbar-toggler collapsed">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar icon-bar-first"></span>
                    <span class="icon-bar icon-bar-two"></span>
                    <span class="icon-bar icon-bar-three"></span>
                </button> 

                <!-- MAIN Vav -->
                <div class="nav-animation header-nav navbar-collapse collapse d-flex justify-content-center">

                    <ul class=" nav navbar-nav">
                        <li class="has-mega-menu"><a href="/">Accueil</a>                                                                
                        </li>
                        <li class="has-child"><a href="/about">Qui somme nous</a>                                                                 
                        </li>
                        <li class="has-child"><a href="/annonce">Annonce</a>                                                                 
                        </li>
                        <li class="has-child"><a href="/ajouterannonce">Publier une annonce</a>                                                                 
                        </li>
                        <li class="has-child"><a href="/contact">Contact</a>                                                                
                        </li>
                    </ul>

                </div>
                
                <!-- Header Right Section-->
                <div class="extra-cell">
                    <div class="header-nav-btn-section">
                        <div class="twm-nav-btn-left" *ngIf="!isLoggedIn">
                            <a class="twm-nav-sign-up" href="/register">
                                <i class="feather-log-in"></i>Register
                            </a>
                        </div>
                        <div class="twm-nav-btn-right" *ngIf="!isLoggedIn">
                            <a href="/login" class="twm-nav-post-a-job">
                                <i class="feather-briefcase"></i>Log in
                            </a>
                        </div>
                        <div class="twm-nav-btn-left" *ngIf="isLoggedIn">
                            <a class="twm-nav-sign-up" (click)="logout()" style="color: red;">
                                <i class="feather-log-in"></i>Déconnexion
                            </a>
                        </div>
                    </div>
                </div>                         
            </div>    
        </div>
    </div>
</header>
