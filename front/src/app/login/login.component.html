<!DOCTYPE html>
<html lang="en">
<head>
    <!-- META -->
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="keywords" content="" />
    <meta name="author" content="" />
    <meta name="robots" content="" />    
    <meta name="description" content="" />
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
	<div class="page-wraper">
        <!-- CONTENT START -->
        <div class="page-content">
            <!-- Login Section Start -->
          <form (ngSubmit)="login()" [formGroup]="loginForm">
            <div class="section-full site-bg-white">
                
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-xl-8 col-lg-6 col-md-5 twm-log-reg-media-wrap">
                            <div class="twm-log-reg-media">
                                <div class="twm-l-media">
                                    <img src="assets/images/login-bg.png" alt="">
                                </div>
                            </div>
                        </div>
                        <div class="col-xl-4 col-lg-6 col-md-7">
                            <div class="twm-log-reg-form-wrap">
                                <div class="twm-log-reg-logo-head">
                                    <a href="index.html">
                                        <img src="assets/images/logo1.png" alt="" class="logo">
                                    </a> 
                                </div>

                                <div class="twm-log-reg-inner">
                                    <div class="twm-log-reg-head">
                                        <div class="twm-log-reg-logo">
                                            <span class="log-reg-form-title">Se connecter</span>
                                        </div>
                                    </div>
                                    <div class="twm-tabs-style-2">
                                     
                                        
                                        <div class="tab-content" id="myTab2Content">
                                            <!--Login Candidate Content-->  
                                            <div class="tab-pane fade show active" id="twm-login-candidate">
                                                <div class="row">
                                                    <div class="col-lg-12">
                                                        <div class="form-group mb-3">
                                                            <input name="email" type="email" required="" class="form-control" placeholder="Email*" formControlName="email"> 
                                                        </div>
                                                        <div *ngIf="email?.touched && email?.invalid">
                                                            <small class="text-danger" *ngIf="email?.errors?.['required']">email est obligatoire</small>
                                                          </div>
                                                    </div>
                                                    <div class="col-lg-12">
                                                        <div class="form-group mb-3">
                                                            <input name="mp" type="password" class="form-control" required="" placeholder="Mot de passe*" formControlName="mp">
                                                        </div>
                                                        <div *ngIf="mp?.touched && mp?.invalid">
                                                            <small class="text-danger" *ngIf="mp?.errors?.['required']">mot de passe est obligatoire</small>
                                                        </div>
                                                    </div>
                                                    <div class="col-md-12">
                                                        <div class="form-group">
                                                            <button type="submit" class="site-button">Se connecter</button>
                                                            <span [innerHtml]="this.messageCommande"></span>
                                                        </div>
                                                    </div>
                                                    <a href="/register" style="text-decoration: underline;">créer compte</a>                                                    
                                                </div>
                                            </div>
                                       
                                        
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
          </form>  
            <!-- Login Section End -->
          
            
     
        </div>
        <!-- CONTENT END -->

        <!-- FOOTER START -->
        <app-footer></app-footer>
        <!-- FOOTER END -->
 	</div>
</body>
</html>
