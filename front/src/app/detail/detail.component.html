<!DOCTYPE html>
<html lang="en">
<head>
    <!-- META -->
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="keywords" content="" />
    <meta name="author" content="" />
    <meta name="robots" content="" />    
    <meta name="description" content="" />
    <!-- PAGE TITLE HERE -->
    <title>Detail</title>
    <!-- MOBILE SPECIFIC -->
    <meta name="viewport" content="width=device-width, initial-scale=1">    
</head>

<body>
    <div class="page-wraper">
        <!-- HEADER START -->
        <app-header></app-header>
        <!-- HEADER END -->
        <!-- CONTENT START -->
        <div class="page-content">
            <!-- INNER PAGE BANNER -->
            <div class="wt-bnr-inr overlay-wraper bg-center" style="background-image:url(assets/images/banner/1.jpg);">
                <div class="overlay-main site-bg-white opacity-01"></div>
                <div class="container">
                    <div class="wt-bnr-inr-entry">
                        <div class="banner-title-outer">
                            <div class="banner-title-name">
                                <h2 class="wt-title">Détail de l'annonce</h2>
                            </div>
                        </div>
                        <!-- BREADCRUMB ROW -->                            
                        
                            <div>
                                <ul class="wt-breadcrumb breadcrumb-style-2">
                                    <li><a href="/">Accueil</a></li>
                                    <li>Détail de l'annonce</li>
                                </ul>
                            </div>
                        
                        <!-- BREADCRUMB ROW END -->                        
                    </div>
                </div>
            </div>
            <!-- INNER PAGE BANNER END -->



            <!-- OUR BLOG START -->
            <div class="section-full  p-t120 p-b90 bg-white">
                <div class="container">
                
                    <!-- BLOG SECTION START -->
                    <div class="section-content">
                        <div class="row d-flex justify-content-center">
                        
                            <div class="col-lg-8 col-md-12">
                                <!-- Candidate detail START -->
                                <div class="cabdidate-de-info">
                                    <div class="twm-job-self-wrap">
                                        <div class="twm-job-self-info">
                                            <div class="twm-job-self-top">
                                                <div class="twm-media-bg">
                                                    <img src={{Annonce.image}} alt="#">
                                                </div>
                                                <div class="twm-mid-content">
                                                    <h4 class="twm-job-title">{{Annonce.nom}}</h4>
                                                    <p class="twm-job-address"><i class="feather-map-pin"></i>{{Annonce.adresse}}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <h4 class="twm-s-title">Annonce  description:</h4>

                                    <p>{{Annonce.description}} </p>
                                </div>
                            </div>
                        </div>              
                    </div>
                </div>
                <section >
                    <div class="container my-5 py-5" >
                      <div class="row d-flex justify-content-center" >
                        <div class="col-md-12 col-lg-10 col-xl-8" >
                          <div class="card" style="border: 2px solid;">
                            <div class="card-body" *ngFor="let comment of listComment">
                              <div class="d-flex flex-start align-items-center">
                                <div>
                                  <h6 class="fw-bold text-primary mb-1">{{comment?.client.nom}} {{comment?.client.prenom}}</h6>
                                </div>
                              </div>
                  
                              <p class="mt-3 mb-4 pb-2">{{comment?.com}}</p>
                            </div>
                            <div class="card-footer py-3 border-0" style="background-color: #f8f9fa;">
                              <div class="d-flex flex-start w-100">
                                <div data-mdb-input-init class="form-outline w-100">
                                  <textarea class="form-control" id="textAreaExample" rows="4" [(ngModel)]="com"
                                    style="background: #fff;" placeholder="Commentaire"></textarea>
                                </div>
                              </div>
                              <div class="float-end mt-2 pt-1">
                                <button  (click)="addComment()" type="submit" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-sm">Envoyer</button>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                </section>
            </div>   
            <!-- OUR BLOG END -->           
        </div>
        <!-- CONTENT END -->

        <!-- FOOTER START -->
        <app-footer></app-footer>
        <!-- FOOTER END -->
 	</div>
</body>
</html>
