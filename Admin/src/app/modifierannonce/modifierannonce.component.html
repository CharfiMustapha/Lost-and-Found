<!DOCTYPE html>
<html lang="en"> 
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edmin admin is super flexible, powerful, clean &amp; modern responsive bootstrap admin template with unlimited possibilities.">
    <meta name="keywords" content="admin template, Edmin admin template, best javascript admin, dashboard template, bootstrap admin template, responsive admin template, web app">
    <meta name="author" content="pixelstrap">
    <title>Modifier annonce</title>
  </head>
  <body>
    <!-- tap to top-->
    <div class="tap-top">
      <svg class="feather">
        <use href="https://admin.pixelstrap.net/edmin/assets/svg/feather-icons/dist/feather-sprite.svg#arrow-up"></use>
      </svg>
    </div>
    <!-- loader-->
 
    <main class="page-wrapper compact-wrapper" id="pageWrapper">
      <!-- Page header start -->
      <app-header></app-header>
      <!-- Page header end-->
      <div class="page-body-wrapper">
        <!-- Page sidebar start-->
        <app-menu></app-menu>
        <!-- Page sidebar end-->
        <div class="page-body">
          <div class="container-fluid">
            <div class="row"> 
              <div class="col-xl-12">
                <div class="card">
                  <div class="card-body basic-wizard important-validation">
                    <div id="msform">
                      <form class="stepper-one row g-3 needs-validation custom-input" novalidate="" (ngSubmit)="updateAnnonce()" [formGroup]="updateForm">
                        <div class="col-sm-8">
                          <label class="form-label" for="nomwizard">Nom<span class="font-danger">*</span></label>
                          <input class="form-control" id="nomwizard" type="text" required="" placeholder="Nom" formControlName="nom">
                        </div>
                        <div *ngIf="nom?.touched && nom?.invalid">
                          <small class="text-danger" *ngIf="nom?.errors?.['required']">nom est obligatoire</small>
                        </div>
                        <div class="col-sm-8">
                          <label class="form-label" for="image-basic-wizard">image<span class="font-danger">*</span></label>
                          <input class="form-control" id="image-basic-wizard" type="file" (change)="onSelectFile($event)" required placeholder="image" formControlName="image">
                        </div>
                        <div *ngIf="image?.touched && image?.invalid">
                          <small class="text-danger" *ngIf="image?.errors?.['required']">image est obligatoire</small>
                        </div>
                        <div class="col-8">
                          <label class="col-sm-8 form-label" for="passwordwizard">description<span class="font-danger">*</span></label>
                          <textarea name="description" class="form-control" rows="3" placeholder="Description" formControlName="description"></textarea>
                        </div>
                        <div *ngIf="description.touched && description.invalid">
                          <small class="text-danger" *ngIf="description.errors?.['required']">description est obligatoire</small>
                        </div>
                        <div class="col-8">
                            <label class="col-sm-8 form-label" for="passwordwizard">Adresse<span class="font-danger">*</span></label>
                            <input class="form-control" id="passwordwizard" type="text" placeholder="Adresse" required="" formControlName="adresse">
                        </div>
                        <div *ngIf="adresse?.touched && adresse?.invalid">
                          <small class="text-danger" *ngIf="adresse?.errors?.['required']">adresse est obligatoire</small>
                        </div>
                        <div class="col-8">
                          <button type="submit" class="btn btn-primary">Modifier</button>
                        </div>
                      </form>
                    </div>
                  </div>
                </div>
              </div>  
            </div>
          </div>
          <!-- Container-fluid ends-->
        </div>
        <app-footer></app-footer>
      </div>
    </main>
  </body>
</html>
