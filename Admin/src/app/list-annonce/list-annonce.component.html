<!DOCTYPE html>
<html lang="en"> 
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edmin admin is super flexible, powerful, clean &amp; modern responsive bootstrap admin template with unlimited possibilities.">
    <meta name="keywords" content="admin template, Edmin admin template, best javascript admin, dashboard template, bootstrap admin template, responsive admin template, web app">
    <meta name="author" content="pixelstrap">
    <title>List annonce</title>
  </head>
  <body>
    <!-- tap to top-->
    <div class="tap-top">
      <svg class="feather">
        <use href="https://admin.pixelstrap.net/edmin/assets/svg/feather-icons/dist/feather-sprite.svg#arrow-up"></use>
      </svg>
    </div>
    <!-- loader-->

    <main class="page-wrapper compact-wrapper" id="pageWrapper">
      <!-- Page header start -->
      <app-header></app-header>
      <!-- Page header end-->
      <div class="page-body-wrapper">
        <!-- Page sidebar start-->
        <app-menu></app-menu>
        <!-- Page sidebar end-->
        <div class="page-body">
          <div class="container-fluid">
            <div class="row page-title">
              <div class="col-sm-6">
                <h3>Liste Annonce</h3>
              </div>
            </div>
          </div>
          <!-- Container-fluid starts-->
          <div class="container-fluid table-space basic_table">
            <div class="row"> 
              <div class="col-sm-12">
                <div class="card">
                  <div class="table-responsive">
                    <table class="table">
                      <thead>
                        <tr class="b-b-primary">
                          <th scope="col">Id</th>
                          <th scope="col">Nom</th>
                          <th scope="col">Image</th>
                          <th scope="col">Description</th>
                          <th scope="col">Adresse</th>
                          <th scope="col">Action</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr class="b-b-tertiary" *ngFor="let annonce of listAnnonce">
                          <td>{{annonce.id}}</td>
                          <td>{{annonce.nom}}</td>
                          <td><img [src]="annonce.image" style="width: 170px;; height: 150px;;"></td>
                          <td>{{annonce.description}}</td>
                          <td>{{annonce.adresse}}</td>
                          <td>
                            <a href="/modifierannonce/{{annonce.id}}" type="submit" class="btn btn-success">Modifier</a>
                            <button type="submit" (click)="Deleteannonce(annonce)" class="btn btn-danger">Supprimer</button>
                          </td>
                        </tr>
                        
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
          
           
            </div>
          </div>
          <!-- Container-fluid starts-->
        </div>
        <app-footer></app-footer>
      </div>
    </main>
  </body>

</html>
